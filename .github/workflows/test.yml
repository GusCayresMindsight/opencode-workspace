name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native add-on
        run: npm rebuild better-sqlite3

      - name: Run unit tests
        run: npx cucumber-js
