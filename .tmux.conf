# ─── Pane borders ────────────────────────────────────────────────────────────
# Active pane gets a bright border; inactive panes fade out
set -g pane-border-style          "fg=colour238"
set -g pane-active-border-style   "fg=colour39 bold"   # bright cyan

# Show pane titles in the border line
set -g pane-border-status    top
set -g pane-border-format    " #P: #{pane_title} "

# ─── Status bar ──────────────────────────────────────────────────────────────
set -g status-position   bottom
set -g status-style      "bg=colour235 fg=colour250"
set -g status-interval   2

# Left: session name
set -g status-left-length  20
set -g status-left         " #[fg=colour39 bold]#S#[default] "

# Right: date + time
set -g status-right-length 30
set -g status-right        "#[fg=colour246] %H:%M  %d %b "

# Window tabs — inactive
set -g window-status-format         " #I:#W "
set -g window-status-style          "fg=colour246 bg=colour235"

# Window tabs — ACTIVE (bold + bright background so it can't be missed)
set -g window-status-current-format " #I:#W "
set -g window-status-current-style  "fg=colour235 bg=colour39 bold"

# ─── Pane numbering display (prefix + q) ─────────────────────────────────────
set -g display-panes-time        2000    # keep numbers visible for 2 s
set -g display-panes-colour      colour246
set -g display-panes-active-colour colour39

# ─── Misc quality-of-life ─────────────────────────────────────────────────────
set -g base-index        1        # start window numbers at 1
set -g pane-base-index   1        # start pane numbers at 1
set -g renumber-windows  on       # keep window numbers contiguous
set -g mouse             on       # click to select panes/windows

# ─── State persistence ────────────────────────────────────────────────────────
# tmux-resurrect  — manual save/restore (prefix + Ctrl-s / Ctrl-r)
# tmux-continuum  — automatic periodic save
#
# Install once with:  make setup
set -g @resurrect-capture-pane-contents 'on'   # save pane scroll-back too
set -g @continuum-save-interval '15'            # auto-save every 15 minutes

# Show continuum save status in status bar right (e.g. "continuum: on")
set -g status-right-length 50
set -g status-right        "#[fg=colour246]#{continuum_status}  %H:%M  %d %b "

# Load plugins only when installed (make setup clones them)
if-shell '[ -f ~/.tmux/plugins/tmux-resurrect/resurrect.tmux ]' \
  'run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
if-shell '[ -f ~/.tmux/plugins/tmux-continuum/continuum.tmux ]' \
  'run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux'
